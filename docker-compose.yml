services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Postgres доступен только внутри docker-сети, наружу не публикуется.

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD}
      EMAIL_SERVER_SECURE: ${EMAIL_SERVER_SECURE}
      EMAIL_FROM: ${EMAIL_FROM}
      CRON_SECRET: ${CRON_SECRET}
      NHL_SEASON: ${NHL_SEASON}
    # Слушаем ТОЛЬКО на 127.0.0.1 — наружу торчит хостовый nginx.
    # Хотите изменить порт — поменяйте левую часть, например "127.0.0.1:3100:3000".
    ports:
      - "127.0.0.1:3000:3000"

  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET}
    command: >
      sh -c "apk add --no-cache curl &&
             echo '*/15 * * * * curl -fsS -H \"Authorization: Bearer $$CRON_SECRET\" http://app:3000/api/cron/update-results > /proc/1/fd/1 2>&1' > /etc/crontabs/root &&
             crond -f -l 2"

volumes:
  pgdata:
